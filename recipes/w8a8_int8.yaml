# W8A8 INT8 — weights AND activations quantized to int8.
# Uses SmoothQuant to migrate activation outliers into the weights so that
# per-tensor / per-channel int8 stays accurate. Heavier than W4A16 on memory
# but often a touch more accurate on math + reasoning tasks.
quant_stage:
  quant_modifiers:
    SmoothQuantModifier:
      smoothing_strength: 0.8
    GPTQModifier:
      ignore: ["lm_head"]
      config_groups:
        group_0:
          weights:
            num_bits: 8
            type: int
            symmetric: true
            strategy: channel
          input_activations:
            num_bits: 8
            type: int
            symmetric: true
            strategy: token
            dynamic: true
          targets: ["Linear"]
